spring:
  application:
    name: shibary_back
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:shibary}
    username: ${DB_USERNAME:shibary}
    password: ${DB_PASSWORD:shibary}
  sql:
    init:
      mode: always

chad:
  api:
    key: chad-521f2bbdce924f3099b5d7b9b87aeec2tixjo1r1
    url: https://ask.chadgpt.ru/api/public/gemini-3.1-flash-lite
    sentence-count: 10

libretranslate:
  url: ${LIBRETRANSLATE_URL:http://localhost:5000}
  api-key: ${LIBRETRANSLATE_API_KEY:}
  source-lang: en
  target-lang: ru

server:
  port: ${SERVER_PORT:8080}

logging:
  file:
    name: logs/shibary.log
  pattern:
    rolling-file-name: logs/shibary-%d{yyyy-MM-dd}.%i.log

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    logfile:
      external-file: logs/shibary.log
    loggers:
      access: unrestricted
    health:
      show-details: always

spring.boot.admin:
  context-path: /admin
  client:
    url: ${SBA_CLIENT_URL:http://localhost:${server.port}/admin}
    username: ${admin.security.username}
    password: ${admin.security.password}
    instance:
      service-base-url: ${SBA_SERVICE_BASE_URL:http://localhost:${server.port}}
      name: ${spring.application.name}
      metadata:
        user.name: ${admin.security.username}
        user.password: ${admin.security.password}

admin:
  security:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:}
