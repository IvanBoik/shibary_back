services:
  postgres:
    image: postgres:17-alpine
    container_name: shibary-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: shibary
      POSTGRES_USER: shibary
      POSTGRES_PASSWORD: shibary
    volumes:
      - pgdata:/var/lib/postgresql/data

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: shibary-libretranslate
    restart: unless-stopped
    ports:
      - "5000:5000"
    tty: true
    environment:
      LT_LOAD_ONLY: "en,ru"
      LT_DISABLE_WEB_UI: "true"
    healthcheck:
      test: ["CMD-SHELL", "./venv/bin/python scripts/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    volumes:
      - libretranslate-api-keys:/app/db
      - libretranslate-models:/home/libretranslate/.local:rw

  shibary-back:
    build: .
    container_name: shibary-back
    restart: unless-stopped
    ports:
      - "9090:8080"
    depends_on:
      - postgres
      - libretranslate
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: shibary
      DB_USERNAME: shibary
      DB_PASSWORD: shibary
      CHAD_API_KEY: ${CHAD_API_KEY}
      LIBRETRANSLATE_URL: http://libretranslate:5000

volumes:
  pgdata:
  libretranslate-api-keys:
  libretranslate-models:
