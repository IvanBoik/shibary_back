name: Update secrets

on:
  workflow_dispatch:
    inputs:
      restart:
        description: "Recreate shibary-back container to pick up new env"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  update-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Update .env via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          debug: false
          envs: CHAD_API_KEY,ADMIN_USERNAME,ADMIN_PASSWORD,RESTART
          script: |
            set -e
            REPO_DIR=/home/deploy/shibary_back
            cd "$REPO_DIR"

            # пишем .env атомарно: сначала во временный файл, потом mv
            umask 077
            TMP_ENV="$(mktemp .env.XXXXXX)"
            cat > "$TMP_ENV" <<EOF
            CHAD_API_KEY=${CHAD_API_KEY}
            ADMIN_USERNAME=${ADMIN_USERNAME}
            ADMIN_PASSWORD=${ADMIN_PASSWORD}
            EOF
            chmod 600 "$TMP_ENV"
            mv "$TMP_ENV" .env

            if [ "$RESTART" = "true" ]; then
              docker compose up -d --force-recreate --no-build shibary-back
            else
              echo ".env updated. Container NOT restarted (manual restart required)."
            fi
        env:
          CHAD_API_KEY: ${{ secrets.CHAD_API_KEY }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          RESTART: ${{ inputs.restart }}
