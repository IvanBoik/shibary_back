name: Deploy to server

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          debug: true
          envs: CHAD_API_KEY,ADMIN_USERNAME,ADMIN_PASSWORD
          script: |
            set -e
            REPO_DIR=/home/deploy/shibary_back
            REPO_URL=https://github.com/${{ github.repository }}.git
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone "$REPO_URL" "$REPO_DIR"
            fi
            cd "$REPO_DIR"
            git fetch --all
            git reset --hard origin/master

            # формируем .env на сервере из переменных окружения сессии.
            # 'EOF' без кавычек -> переменные подставляются shell'ом,
            # значения не цитируем, чтобы docker compose не воспринял кавычки буквально.
            cat > .env <<EOF
            CHAD_API_KEY=${CHAD_API_KEY}
            ADMIN_USERNAME=${ADMIN_USERNAME}
            ADMIN_PASSWORD=${ADMIN_PASSWORD}
            EOF
            chmod 600 .env

            docker compose pull
            docker compose up -d --build --force-recreate shibary-back
            docker image prune -f
        env:
          CHAD_API_KEY: ${{ secrets.CHAD_API_KEY }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
